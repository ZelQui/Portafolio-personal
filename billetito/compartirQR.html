<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi QR - Billetito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>

<body class="bg-gray-100 flex flex-col items-center min-h-screen">

    <!-- HEADER -->
    <header class="w-full bg-[#00DF00] shadow-lg p-3 flex justify-between items-center rounded-b-3xl">
        <!-- IZQUIERDA: Icono que redirige -->
        <div class="flex items-center">
            <a href="dashboard.html" class="text-white hover:text-green-200 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8">
                    <path fill-rule="evenodd"
                        d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-4.28 9.22a.75.75 0 0 0 0 1.06l3 3a.75.75 0 1 0 1.06-1.06l-1.72-1.72h5.69a.75.75 0 0 0 0-1.5h-5.69l1.72-1.72a.75.75 0 0 0-1.06-1.06l-3 3Z"
                        clip-rule="evenodd" />
                </svg>
            </a>
        </div>

        <!-- DERECHA: Logo estático -->
        <div class="flex items-center">
            <img src="img/LogoBilletito blanco.png" alt="Logo Billetito" class="max-w-[105px] h-30 object-contain" />
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="flex flex-col items-center text-center mt-6 p-6 bg-white shadow-xl rounded-2xl max-w-md w-full mx-4">

        <h1 class="text-3xl font-bold text-gray-900 leading-tight">Deyvi Jesus Zelada Quiroz</h1>

        <p class="mt-2 text-base text-gray-600 px-4">
            Muestra tu QR para recibir billetito sin compartir tu número de celular
        </p>

        <div id="qrBilletito" class="mt-4 p-4 bg-white rounded-lg shadow-sm"></div>

        <button onclick="shareQR()"
            class="mt-8 flex items-center justify-center gap-2 bg-[#00DF00] hover:bg-green-600 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all duration-300 transform hover:scale-105">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
            </svg>
            <span>Compartir QR</span>
        </button>
    </main>

    <script>
        // Crear el QR con tu configuración original
        const qrCode = new QRCodeStyling({
            width: 200,
            height: 200,
            data: "Codigo Billetito: 5555Deyvi",
            image: "img/LogoBilletito2.jpg",
            dotsOptions: {
                color: "#00DF00",
                type: "rounded"
            },
            backgroundOptions: {
                color: "#ffffff"
            },
            imageOptions: {
                crossOrigin: "anonymous",
                margin: 3,
                imageSize: 0.3
            }
        });

        qrCode.append(document.getElementById("qrBilletito"));

        async function shareQR() {
            // Verifica si el navegador soporta la Web Share API
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([""], "dummy.png", { type: "image/png" })] })) {
                try {
                    const qrBlob = await qrCode.getRawData("png");
                    const qrFile = new File([qrBlob], 'mi-qr.png', { type: 'image/png' });

                    await navigator.share({
                        title: '¡Recibe dinero con mi QR de Billetito!',
                        text: 'Te comparto mi QR para que puedas enviarme un Billetito sin pedirme mi número de celular. ¡Es rápido y seguro!',
                        files: [qrFile]
                    });
                } catch (err) {
                    // Maneja el error si el usuario cancela la acción
                    console.log('El usuario canceló o hubo un error:', err);
                }
            } else {
                // Mensaje si la API no está disponible
                alert('La función de compartir no está disponible en este navegador. Puedes guardar la imagen del QR y compartirla manualmente.');
            }
        }
    </script>

    <!-- Navegación inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white p-4 pb-6 sm:px-6 sm:py-4 flex justify-center gap-3 sm:gap-4">
        <button onclick="goToScan()"
            class="bg-white text-[#00DF00] font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg border border-[#00DF00] flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[160px] justify-center hover:shadow-xl transition-shadow text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z" />
            </svg>
            <span class="whitespace-nowrap">Escanear</span>
        </button>

        <button onclick="goToSend()"
            class="bg-[#00DF00] text-white font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[180px] justify-center hover:bg-green-600 transition-colors text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
            <span class="whitespace-nowrap">Enviar billetito</span>
        </button>
    </nav>
</body>

</html>
