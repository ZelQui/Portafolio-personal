<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar Dinero</title>
  <link rel="icon" href="img/billetito.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="css/sendmoney.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>

<body>
  <main class="flex items-center justify-center min-h-screen bg-green-100">
    <div
      class="bg-white relative rounded-2xl shadow-xl p-6 w-full max-w-sm mx-auto text-center overflow-hidden sm:p-8 sm:max-w-md flex flex-col justify-center"
      style="min-height: 600px; height: auto;">
      <button onclick="window.location.href='dashboard.html'"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl sm:text-3xl z-20">
        ✕
      </button>

      <button id="btnVolver" onclick="volverAInicio()"
        class="absolute top-4 left-4 text-gray-500 hover:text-gray-800 hidden z-20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 sm:h-8 sm:w-8" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <div id="seccionNumero" class="max-w-md mx-auto">
        <!-- Logo -->
        <img src="img/LogoBilletito.png" alt="Logo Billetito" class="mx-auto h-20 sm:h-24 object-contain mb-4" />

        <!-- Título -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-6 sm:text-3xl text-center">
          Enviar Billetito
        </h2>

        <!-- Input de búsqueda -->
        <input id="numeroCelular" type="tel" maxlength="9" placeholder="Escribe número o nombre"
          onkeyup="filtrarContactos()"
          class="w-full px-4 py-3 mb-4 border border-gray-300 rounded-xl text-center text-lg focus:outline-none focus:ring-2 focus:ring-green-500 sm:py-4 sm:text-xl" />

        <!-- Lista de contactos -->
        <div id="listaContactos" class="space-y-2 max-h-60 overflow-y-auto">
          <!-- Los contactos se generan por JS -->
        </div>

        <!-- Botón continuar -->
        <button onclick="validarNumero()"
          class="w-full mt-6 bg-[#00DF00] text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition text-lg sm:py-4 sm:text-xl">
          Continuar
        </button>
      </div>

      <div id="seccionEnvio" class="hidden">
        <div id="nombreDetectado" class="text-[#00DF00] font-semibold text-xl mb-4 sm:text-2xl"></div>

        <div class="flex items-center justify-center mb-1">
          <span class="prefijo-s">S/</span>
          <input id="monto" type="number" step="0.01" min="0.01" max="500.00" placeholder="0.00"
            class="text-5xl font-bold text-[#00DF00] text-right rounded-2xl py-4 px-4 focus:outline-none focus:ring-2 focus:ring-green-500 sm:text-6xl"
            inputmode="decimal" style="width: 182px;" />
        </div>

        <p id="mensajeMonto" class="text-sm text-gray-500 mt-1 sm:text-base">Monto máximo permitido: S/ 500.00</p>

        <input id="mensaje" type="text" placeholder="Escribe un mensaje (opcional)"
          class="w-full px-4 py-3 mt-6 mb-6 border border-gray-300 rounded-xl text-center focus:outline-none focus:ring-2 focus:ring-green-500 sm:py-4 sm:text-lg" />

        <div class="flex gap-3 mt-6">
          <button onclick="iniciarOtrosBancos()"
            class="w-1/2 border border-[#00DF00] text-[#00DF00] py-3 rounded-xl font-semibold hover:bg-green-100 transition text-lg sm:py-4 sm:text-xl">
            Otros Bancos
          </button>

          <button id="btnEnviar" onclick="iniciarEnvio()"
            class="w-1/2 bg-[#00DF00] text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed text-lg sm:py-4 sm:text-xl"
            disabled>
            Enviar
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Sección de comprobante FUERA del main, ocupando toda la pantalla -->
  <div id="seccionComprobante" class="hidden fixed inset-0 bg-green-100 z-50 overflow-y-auto p-4">
    <div class="max-w-sm mx-auto min-h-screen flex flex-col">
      <!-- Fondo verde con gradiente -->
      <div class="bg-[#00DF00] rounded-t-3xl p-5 relative flex-shrink-0">
        <!-- Botón cerrar -->
        <button onclick="volverADashboard()"
          class="absolute top-4 right-4 w-8 h-8 bg-black bg-opacity-20 rounded-full flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>

        <!-- Logo Billetito -->
        <div class="flex items-center">
          <img src="img/LogoBilletito blanco.png" alt="Logo Billetito" class="max-w-[120px] h-30 object-contain" />
        </div>
      </div>

      <!-- Card blanca principal -->
      <div class="bg-white rounded-b-3xl shadow-lg">
        <!-- Header del comprobante -->
        <div class="p-6 pb-4">
          <div class="flex justify-between items-start mb-6">
            <div>
              <h3 class="text-1xl font-bold text-gray-800 mb-1">¡Billetito Enviado!</h3>
              <p id="comprobanteMonto" class="text-4xl font-bold text-gray-900">S/ 20.00</p>
            </div>
            <button onclick="shareComprobante()" class="flex items-center text-[#00DF00] font-semibold">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z">
                </path>
              </svg>
              COMPARTIR
            </button>
          </div>

          <!-- Destinatario -->
          <p id="comprobanteDestinatario" class="text-lg font-medium text-gray-800 mb-3">Billetito - Deyvi J. Zelada Q.
          </p>

          <!-- Fecha y hora -->
          <div class="flex items-center text-gray-500 text-sm mb-6">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <span id="comprobanteFecha">17/8/2025</span>
            <span class="mx-2">|</span>
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="comprobanteHora">1:21:06 p. m.</span>
          </div>

          <!-- Mensaje -->
          <div id="comprobanteMensajeContainer" class="bg-gray-100 rounded-lg p-3 mb-3 hidden">
            <div class="flex items-center">
              <svg class="w-5 h-5 text-gray-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd"
                  d="M12 2.25c-2.429 0-4.817.178-7.152.521C2.87 3.061 1.5 4.795 1.5 6.741v6.018c0 1.946 1.37 3.68 3.348 3.97.877.129 1.761.234 2.652.316V21a.75.75 0 0 0 1.28.53l4.184-4.183a.39.39 0 0 1 .266-.112c2.006-.05 3.982-.22 5.922-.506 1.978-.29 3.348-2.023 3.348-3.97V6.741c0-1.947-1.37-3.68-3.348-3.97A49.145 49.145 0 0 0 12 2.25ZM8.25 8.625a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25Zm2.625 1.125a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Zm4.875-1.125a1.125 1.125 0 1 0 0 2.25 1.125 1.125 0 0 0 0-2.25Z"
                  clip-rule="evenodd" />
              </svg>

              <span id="comprobanteMensaje" class="text-gray-600 font-medium">"fa"</span>
            </div>
          </div>
        </div>

        <!-- Separador -->
        <div class="border-t border-gray-200 mx-6"></div>

        <!-- Datos de la transacción -->
        <div class="p-6">
          <h4 class="text-gray-500 text-sm font-medium mb-4 uppercase tracking-wider">DATOS DE LA TRANSACCIÓN</h4>

          <div class="space-y-3">
            <div class="flex justify-between">
              <span class="text-gray-600">Destino</span>
              <span id="comprobanteDestino" class="text-gray-900 font-medium">Billetito</span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-600">Nro. de operación</span>
              <span id="comprobanteOperacion" class="text-gray-900 font-medium">7888765</span>
            </div>
            <div id="comprobanteMedioPagoRow" class="flex justify-between hidden">
              <span class="text-gray-600">Medio de pago</span>
              <span id="comprobanteMedioPago" class="text-gray-900 font-medium"></span>
            </div>
          </div>
        </div>

        <!-- Botón principal -->
        <div class="p-3 pt-0">
          <button onclick="volverADashboard()"
            class="w-full bg-[#00DF00] hover:bg-green-600 text-white font-bold py-2 rounded-xl text-lg transition-colors">
            Listo
          </button>
        </div>
      </div>

      <!-- Botón de ayuda -->
      <div class="mt-4 text-center pb-6 flex-shrink-0">
        <button
          class="flex items-center justify-center mx-auto text-white font-medium bg-gradient-to-br from-green-500 to-green-700 px-6 py-3 rounded-full">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 12a9 9 0 1118 0v3a3 3 0 01-3 3h-1.5a1.5 1.5 0 01-1.5-1.5V14a2 2 0 012-2H21M3 12h3a2 2 0 012 2v2.5A1.5 1.5 0 016.5 18H5a3 3 0 01-3-3v-3z" />

          </svg>
          NECESITO AYUDA
        </button>
      </div>
    </div>
  </div>

  <script>
    const nombres = {
      '912028283': 'Deyvi J. Zelada Q.',
      '928894267': 'Edin Y. Chavez R.',
      '901180767': 'Franklyn E. Celis Z.'
    };

    const listaContactos = document.getElementById("listaContactos");
    const inputNumero = document.getElementById("numeroCelular");

    // Render de contactos
    function mostrarContactos(filtro = "") {
      listaContactos.innerHTML = "";
      const filtroLower = filtro.toLowerCase();

      Object.entries(nombres).forEach(([numero, nombre]) => {
        if (numero.includes(filtro) || nombre.toLowerCase().includes(filtroLower)) {
          const contacto = document.createElement("div");
          contacto.className =
            "flex items-center justify-between p-3 bg-gray-100 rounded-xl cursor-pointer hover:bg-green-100 transition";

          contacto.innerHTML = `
          <div>
            <p class="font-medium text-gray-800">${nombre}</p>
            <p class="text-sm text-gray-500">${numero}</p>
          </div>
        `;

          contacto.onclick = () => {
            inputNumero.value = numero;   // rellena input
            validarNumero();             // llama validación instantánea
          };

          listaContactos.appendChild(contacto);
        }
      });
    }

    // Filtro dinámico
    function filtrarContactos() {
      mostrarContactos(inputNumero.value);
    }

    // Validar número antes de continuar
    function validarNumero() {
      const numero = inputNumero.value.trim();
      if (numero.length !== 9 || isNaN(numero)) {
        alert("Por favor ingresa un número válido de 9 dígitos");
        return;
      }
      alert("Enviar billetito a: " + (nombres[numero] || numero));
    }

    // Cargar todos al inicio
    mostrarContactos();
  </script>

  <script>
    const inputMonto = document.getElementById('monto');
    const btnEnviar = document.getElementById('btnEnviar');
    const seccionNumero = document.getElementById('seccionNumero');
    const seccionComprobante = document.getElementById('seccionComprobante');
    const seccionEnvio = document.getElementById('seccionEnvio');

    let medioDePagoSeleccionado = null; // Variable global para almacenar el medio de pago

    function validarNumero() {
      const numero = document.getElementById('numeroCelular').value.trim();
      const nombre = nombres[numero];

      if (nombre) {
        seccionNumero.classList.add('hidden');
        seccionEnvio.classList.remove('hidden');
        document.getElementById('nombreDetectado').textContent = nombre;
        document.getElementById('btnVolver').classList.remove('hidden');

        inputMonto.value = ''; // Limpiar el monto al entrar
        inputMonto.focus();
        actualizarEstadoBotonEnviar(); // Actualizar estado inicial del botón
      } else {
        Swal.fire({
          icon: 'error',
          title: 'Número no registrado',
          text: 'Usa uno de prueba (912028283 o 928894267).'
        });
      }
    }

    function volverAInicio() {
      seccionNumero.classList.remove('hidden');
      seccionComprobante.classList.add('hidden');
      seccionEnvio.classList.add('hidden');
      document.getElementById('btnVolver').classList.add('hidden');
      document.getElementById('numeroCelular').value = '';
      document.getElementById('numeroCelular').focus();

      inputMonto.value = ''; // Limpiar el monto
      document.getElementById('mensaje').value = ''; // Limpiar el mensaje
      actualizarEstadoBotonEnviar(); // Actualizar estado del botón al limpiar

      // Limpiar selección de medio de pago al volver
      medioDePagoSeleccionado = null;
    }

    /**
     * Actualiza el estado del botón "Enviar" basado en el valor del input de monto.
     * También formatea el monto a dos decimales cuando el campo pierde el foco.
     */
    function actualizarEstadoBotonEnviar() {
      let valor = parseFloat(inputMonto.value);
      // Habilitar/Deshabilitar botón si el valor es válido
      if (isNaN(valor) || valor < 0.01 || valor > 500.00) {
        btnEnviar.disabled = true;
      } else {
        btnEnviar.disabled = false;
      }
    }

    // Escuchar el evento 'input' (para cualquier cambio, incluyendo teclado móvil)
    document.addEventListener('DOMContentLoaded', () => {
      inputMonto.addEventListener('input', actualizarEstadoBotonEnviar);

      // Formatear a dos decimales cuando el input pierde el foco
      inputMonto.addEventListener('blur', () => {
        let valor = parseFloat(inputMonto.value);
        if (!isNaN(valor)) {
          inputMonto.value = valor.toFixed(2);
        } else if (inputMonto.value === '') {
          // Si el campo se vacía, dejarlo en blanco o placeholder, no 0.00
        } else {
          // Si hay un valor pero no es numérico válido, limpiarlo
          inputMonto.value = '';
        }
        actualizarEstadoBotonEnviar(); // Revalidar al perder el foco
      });

      // Inicializar el estado del botón al cargar
      actualizarEstadoBotonEnviar();
    });

    function iniciarEnvio() {
      const numero = document.getElementById('numeroCelular').value.trim();
      const valorNumerico = parseFloat(inputMonto.value);
      const mensaje = document.getElementById('mensaje').value;

      if (isNaN(valorNumerico) || valorNumerico < 0.01 || valorNumerico > 500.00) {
        alert("Monto inválido. Ingresa un monto entre S/ 0.01 y S/ 500.00.");
        return;
      }

      let nombreDestinatario = nombres[numero] || numero;

      // --- Pantalla de carga ---
      Swal.fire({
        title: 'Enviando...',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        },
        timer: 1000 // 1 segundo
      }).then(() => {
        // 👉 Aquí va tu lógica original

        const now = new Date();
        const fechaFormateada = now.toLocaleDateString('es-PE', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        });
        const horaFormateada = now.toLocaleTimeString('es-PE', {
          hour: 'numeric',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        });

        const codigoSeguridad = Math.floor(100 + Math.random() * 900);
        const numeroOperacion = Math.floor(1000000 + Math.random() * 9000000);

        // Insertar datos en comprobante
        document.getElementById('comprobanteMonto').textContent = `S/ ${valorNumerico.toFixed(2)}`;
        document.getElementById('comprobanteDestinatario').textContent = `Billetito - ${nombreDestinatario}`;
        document.getElementById('comprobanteFecha').textContent = fechaFormateada;
        document.getElementById('comprobanteHora').textContent = horaFormateada;
        document.getElementById('comprobanteOperacion').textContent = numeroOperacion;

        if (medioDePagoSeleccionado) {
          document.getElementById('comprobanteDestino').textContent = medioDePagoSeleccionado;
          document.getElementById('comprobanteMedioPago').textContent = "Cuenta Billetito";
          document.getElementById('comprobanteMedioPagoRow').classList.remove('hidden');
        } else {
          document.getElementById('comprobanteDestino').textContent = 'Billetito';
          document.getElementById('comprobanteMedioPagoRow').classList.add('hidden');
        }

        if (mensaje) {
          document.getElementById('comprobanteMensaje').textContent = `"${mensaje}"`;
          document.getElementById('comprobanteMensajeContainer').classList.remove('hidden');
        } else {
          document.getElementById('comprobanteMensajeContainer').classList.add('hidden');
        }

        // Mostrar comprobante ocupando toda la pantalla
        seccionComprobante.classList.remove('hidden');
      });
    }


    function volverADashboard() {
      window.location.href = "dashboard.html";
    }

    /**
     * Inicia el flujo de envío a "Otros Bancos" mostrando la modal de selección de medio de pago.
     */

    function iniciarOtrosBancos() {
      const valorNumerico = parseFloat(inputMonto.value);

      if (isNaN(valorNumerico) || valorNumerico < 0.01 || valorNumerico > 500.00) {
        Swal.fire({
          icon: 'error',
          title: 'Monto inválido',
          text: 'Ingresa un monto válido entre S/ 0.01 y S/ 500.00 antes de seleccionar "Otros Bancos".'
        });
        return;
      }

      Swal.fire({
        title: 'Selecciona el banco de destino',
        html: `

             <button class="opcion" data-medio="Yape">
               <svg xmlns="http://www.w3.org/2000/svg" class="icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.592 1L21 12m-2.208 2.208a5.98 5.98 0 01-2.542-.943m0 0V9m0 3.398l-2.433 2.433m4.866-4.866L12 9m3.398 0l2.433-2.433M12 9.001l-2.433 2.433m4.866 4.866L12 15m-3.398 0l-2.433 2.433M12 15.001l-2.433-2.433m4.866-4.866L12 9.001M12 12c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6z" />
               </svg>
               <span>Yape</span>
             </button>
             <button class="opcion" data-medio="Plin">
               <svg xmlns="http://www.w3.org/2000/svg" class="icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.592 1L21 12m-2.208 2.208a5.98 5.98 0 01-2.542-.943m0 0V9m0 3.398l-2.433 2.433m4.866-4.866L12 9m3.398 0l2.433-2.433M12 9.001l-2.433 2.433m4.866 4.866L12 15m-3.398 0l-2.433 2.433M12 15.001l-2.433-2.433m4.866-4.866L12 9.001M12 12c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6z" />
               </svg>
               <span>Plin</span>
             </button>
             <button class="opcion" data-medio="Dale">
               <svg xmlns="http://www.w3.org/2000/svg" class="icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.592 1L21 12m-2.208 2.208a5.98 5.98 0 01-2.542-.943m0 0V9m0 3.398l-2.433 2.433m4.866-4.866L12 9m3.398 0l2.433-2.433M12 9.001l-2.433 2.433m4.866 4.866L12 15m-3.398 0l-2.433 2.433M12 15.001l-2.433-2.433m4.866-4.866L12 9.001M12 12c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6z" />
               </svg>
               <span>Dale</span>
             </button>
             <button class="opcion" data-medio="Agora">
               <svg xmlns="http://www.w3.org/2000/svg" class="icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                 <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.592 1L21 12m-2.208 2.208a5.98 5.98 0 01-2.542-.943m0 0V9m0 3.398l-2.433 2.433m4.866-4.866L12 9m3.398 0l2.433-2.433M12 9.001l-2.433 2.433m4.866 4.866L12 15m-3.398 0l-2.433 2.433M12 15.001l-2.433-2.433m4.866-4.866L12 9.001M12 12c-3.314 0-6 2.686-6 6s2.686 6 6 6 6-2.686 6-6-2.686-6-6-6z" />
               </svg>
               <span>Agora</span>
             </button>

        didOpen: (modalElement) => {

          const btnListoModal = modalElement.querySelector('#btnListoModal');
          let selectedPaymentMethod = null;

          opcionesBtns.forEach(boton => {
            boton.addEventListener('click', () => {
              opcionesBtns.forEach(b => b.classList.remove('selected')); // Elimina la clase 'selected' de todos
              boton.classList.add('selected'); // Añade la clase 'selected' al botón clicado
              selectedPaymentMethod = boton.dataset.medio;

              btnListoModal.disabled = false;
              btnListoModal.classList.remove('bg-green-400');
              btnListoModal.classList.add('bg-[#00DF00]', 'hover:bg-green-700');
            });
          });

          btnListoModal.addEventListener('click', () => {
            if (selectedPaymentMethod) {
              medioDePagoSeleccionado = selectedPaymentMethod; // Guarda el medio de pago seleccionado

              // Si deseas que la confirmación se dispare automáticamente aquí,
              // podrías llamar a iniciarEnvio() sin parámetros: iniciarEnvio();
            }
          });
        }

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    async function shareComprobante() {
      const original = document.getElementById('seccionComprobante');

      // 1) Clonar el comprobante y preparar el clon fuera de pantalla
      const clone = original.cloneNode(true);
      clone.id = 'seccionComprobante-captura';
      clone.classList.remove('hidden', 'fixed', 'inset-0'); // que no bloquee la pantalla
      clone.style.position = 'fixed';
      clone.style.left = '-10000px';
      clone.style.top = '0';
      clone.style.zIndex = '-1';
      document.body.appendChild(clone);

      // 2) Ocultar en el CLON lo que no quieres que salga en la foto
      const hide = (sel) => clone.querySelectorAll(sel).forEach(el => el.style.display = 'none');

      // Botón cerrar (arriba derecha) y botón principal "Listo" comparten el mismo onclick
      hide('button[onclick="volverADashboard()"]');

      // Botón "COMPARTIR" dentro del comprobante
      hide('button[onclick^="shareComprobante"]');

      // Bloque del botón de ayuda "NECESITO AYUDA"
      hide('.mt-4.text-center.pb-6.flex-shrink-0');

      try {
        // 3) Renderizar el clon a imagen
        const canvas = await html2canvas(clone, { useCORS: true, scale: window.devicePixelRatio || 2 });
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], 'comprobante.png', { type: 'image/png' });

        // 4) Compartir la imagen (Web Share API con archivos)
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: 'Comprobante de Billetito',
            text: 'Te comparto mi comprobante.',
            files: [file]
          });
        } else {
          alert('La función de compartir no está disponible en este navegador.');
        }
      } catch (err) {
        console.error('Error al generar/compartir el comprobante:', err);
      } finally {
        // 5) Limpieza: quitar el clon del DOM
        document.body.removeChild(clone);
      }
    }
  </script>
