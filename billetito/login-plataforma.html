<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="icon" href="img/billetito.ico">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border border-green-100 transform transition-all duration-300 hover:scale-105">
    <h2 class="text-4xl font-extrabold text-center text-green-700 mb-8">¡Bienvenido!</h2>

    <input
      type="text"
      id="username"
      placeholder="Usuario"
      class="w-full px-5 py-3 mb-4 border border-green-300 rounded-xl focus:outline-none focus:ring-3 focus:ring-green-400 transition duration-200 text-lg"
    />

    <input
      type="password"
      id="password"
      placeholder="Contraseña"
      class="w-full px-5 py-3 mb-4 border border-green-300 rounded-xl focus:outline-none focus:ring-3 focus:ring-green-400 transition duration-200 text-lg"
    />

    <p id="error" class="text-red-500 text-sm mb-4 text-center font-medium hidden"></p>

    <button
      id="loginBtn"
      class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-xl hover:bg-green-700 transition duration-200 shadow-lg transform hover:scale-105"
    >
      Entrar
    </button>

    <p class="text-center text-gray-600 mt-6 text-md">
      ¿No tienes cuenta?
      <button id="registerBtn" class="text-green-600 font-bold hover:underline">Regístrate aquí</button>
    </p>
  </div>

  <script>
        async function sha256Hex(value) {
            const data = new TextEncoder().encode(value);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
    </script>
    <script>
    function validatePassword(password) {
      if (password.length < 6) {
        return "La contraseña debe tener al menos 6 caracteres.";
      }
      return null;
    }

    document.getElementById("loginBtn").addEventListener("click", async function () {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("error");

      const errorMsg = validatePassword(password);
      if (errorMsg) {
        errorDiv.textContent = errorMsg;
        errorDiv.classList.remove("hidden");
        return;
      }

      if ((await sha256Hex(username)) === "9250e222c4c71f0c58d4c54b50a880a312e9f9fed55d5c3aa0b0e860ded99165" && (await sha256Hex(password)) === "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8") {
        alert("¡Inicio de sesión exitoso!");
        // Aquí puedes redirigir o cargar otra vista
        // window.location.href = "dashboard.html";
      } else {
        errorDiv.textContent = "Usuario o contraseña incorrectos.";
        errorDiv.classList.remove("hidden");
      }
    });

    document.getElementById("registerBtn").addEventListener("click", function () {
      alert("Redirigiendo al formulario de registro...");
      // Aquí podrías redirigir, por ejemplo:
      // window.location.href = "register.html";
    });
  </script>

</body>
</html>
