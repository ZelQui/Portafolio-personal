<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicitud de Microcrédito</title>
    <link rel="icon" href="img/billetito.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 to-green-100 flex flex-col">

    <!-- HEADER -->
    <header class="w-full bg-[#00DF00] shadow-lg p-3 flex justify-between items-center rounded-b-3xl">
        <!-- IZQUIERDA: Icono que redirige -->
        <div class="flex items-center">
            <a href="dashboard.html" class="text-white hover:text-green-200 transition duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8">
                    <path fill-rule="evenodd"
                        d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25Zm-4.28 9.22a.75.75 0 0 0 0 1.06l3 3a.75.75 0 1 0 1.06-1.06l-1.72-1.72h5.69a.75.75 0 0 0 0-1.5h-5.69l1.72-1.72a.75.75 0 0 0-1.06-1.06l-3 3Z"
                        clip-rule="evenodd" />
                </svg>
            </a>
        </div>

        <!-- DERECHA: Logo estático -->
        <div class="flex items-center">
            <img src="img/LogoBilletito blanco.png" alt="Logo Billetito" class="max-w-[105px] h-30 object-contain" />
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-grow flex items-start justify-center p-4 pb-24">
        <div id="paso1">
            <div
                class="flex flex-col items-center justify-center w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border border-green-100">
                <h2 class="text-3xl font-extrabold text-center text-[#00DF00] mb-6">Solicita tu Crédito</h2>

                <!-- Contenedor de botones -->
                <div id="monto-container" class="grid grid-cols-3 gap-2 mb-4 w-full">
                    <!-- Los botones se insertan aquí dinámicamente -->
                </div>

                <!-- Slider de monto -->
                <input id="sliderAmount" type="range" min="100" max="500" step="50" class="w-full mb-2"
                    oninput="syncAmount(this.value)" />
                <input id="amountInput" type="number" placeholder="Monto (S/)" readonly
                    class="w-full px-5 py-3 mb-4 border border-green-300 rounded-xl text-lg text-center font-bold text-[#00DF00] bg-green-50" />

                <!-- Selección de plazo -->
                <select id="termSelect"
                    class="w-full px-5 py-3 mb-4 border border-green-300 rounded-xl bg-white text-lg">
                    <option value="0.5">15 días</option>
                    <option value="1">1 mes</option>
                    <option value="2">2 meses</option>
                    <option value="3">3 meses</option>
                </select>

                <!-- Mensajes -->
                <p id="errorText" class="text-red-500 text-sm mb-2 hidden"></p>

                <!-- Botón Continuar -->
                <button onclick="handlePreview()"
                    class="w-full bg-[#00DF00] text-white py-3 rounded-xl font-bold text-xl hover:bg-green-700 transition transform hover:scale-105 mb-4">
                    Continuar
                </button>
            </div>
        </div>

        <div id="paso2" class="hidden">
            <!-- Resultados del crédito -->
            <div id="result"
                class="bg-white p-6 rounded-2xl shadow-inner border border-green-200 w-full hidden">
                <h3 class="text-2xl font-bold text-[#00DF00] mb-4">Detalles del crédito Billetito seleccionado:</h3>

                <div class="mb-2">
                    <p class="text-gray-700 text-lg font-medium">Monto Solicitado:</p>
                    <p id="resPrincipal" class="font-semibold text-[#00DF00] text-lg"></p>
                </div>

                <div class="mb-2">
                    <p class="text-gray-700 text-lg font-medium">Plazo:</p>
                    <p id="resPlazo" class="font-semibold text-[#00DF00] text-lg"></p>
                </div>

                <div class="mb-2">
                    <p class="text-gray-700 text-lg font-medium">Tasa mensual:</p>
                    <p id="tasa" class="font-semibold text-[#00DF00] text-lg"></p>
                </div>

                <div class="mb-2">
                    <p class="text-gray-700 text-lg font-medium">Intereses Totales:</p>
                    <p id="resInteres" class="font-semibold text-[#00DF00] text-lg"></p>
                </div>

                <div class="mb-2">
                    <p class="text-gray-700 text-lg font-medium">Pago Mensual:</p>
                    <p id="resMensual" class="font-semibold text-[#00DF00] text-lg"></p>
                </div>

                <div class="mt-4">
                    <p class="text-[#00DF00] font-extrabold text-2xl">Total a Pagar:</p>
                    <p id="resTotal" class="text-[#00DF00] text-2xl font-extrabold"></p>
                </div>
            </div>

            <!-- Botón final para enviar solicitud -->
            <button id="btnSolicitar" onclick="sendRequest()"
                class="hidden w-full bg-[#00DF00] text-white py-3 rounded-xl font-bold text-xl hover:bg-green-700 transition transform hover:scale-105 mt-4">
                Solicitar Ahora
            </button>
            <button onclick="goBack()"
                class="w-full bg-gray-200 text-gray-800 py-3 rounded-xl font-bold text-xl hover:bg-gray-300 mt-4">
                Cancelar
            </button>
        </div>

        <div id="paso3" class="hidden">
            <div id="resultBox"
                class="hidden w-full bg-white p-5 rounded-xl border border-green-200 shadow-inner mt-2 text-gray-600">
                <p class="text-lg font-bold">✅ ¡Solicitud Enviada!</p>
                <p><strong>Número de solicitud:</strong> <span id="resCodigo"></span></p>
                <p><strong>Fecha de pago:</strong> <span id="resFechaPago"></span></p>
                <p><strong>Monto solicitado:</strong> <span id="resMonto"></span></p>
                <p><strong>Monto a pagar:</strong> <span id="resPagoFinal"></span></p>
                <p><strong>Plazo:</strong> <span id="resPlazoFinal"></span></p>
            </div>

            <button onclick="goBack()"
                class="w-full bg-[#00DF00] text-white py-3 rounded-xl font-bold text-xl hover:bg-gray-300 mt-4">
                Finalizar
            </button>
        </div>
    </main>

    <!-- Navegación inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white p-4 pb-6 sm:px-6 sm:py-4 flex justify-center gap-3 sm:gap-4">
        <button onclick="goToScan()"
            class="bg-white text-[#00DF00] font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg border border-[#00DF00] flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[160px] justify-center hover:shadow-xl transition-shadow text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z" />
            </svg>
            <span class="whitespace-nowrap">Escanear</span>
        </button>

        <button onclick="goToSend()"
            class="bg-[#00DF00] text-white font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[180px] justify-center hover:bg-green-600 transition-colors text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
            <span class="whitespace-nowrap">Enviar dinero</span>
        </button>
    </nav>

    <script>
        window.onload = () => {
            setAmount(100);
            showStep(1);
        };

        function showStep(step) {
            // Oculta todo
            document.getElementById("paso1").classList.add("hidden");
            document.getElementById("paso2").classList.add("hidden");
            document.getElementById("paso3").classList.add("hidden");

            // Muestra el paso actual
            document.getElementById(`paso${step}`).classList.remove("hidden");
            // Mostrar botón de solicitar solo en paso 2
            if (step === 2) {
                document.getElementById("result").classList.remove("hidden");
                document.getElementById("btnSolicitar").classList.remove("hidden");
            } else {
                document.getElementById("result").classList.add("hidden");
                document.getElementById("btnSolicitar").classList.add("hidden");
            }
        }

        // CONTENIDO DINÁMICO DE MONTO
        const container = document.getElementById('monto-container');
        const montos = [100, 150, 200, 250, 300, 350, 400, 450, 500];

        montos.forEach(monto => {
            const button = document.createElement('button');
            button.textContent = monto;
            button.className = "bg-green-100 hover:bg-green-200 text-[#00DF00] py-2 rounded-xl font-semibold";
            button.onclick = () => setAmount(monto);
            container.appendChild(button);
        });

        function setAmount(valor) {
            document.getElementById("amountInput").value = valor;
            document.getElementById("sliderAmount").value = valor;
        }

        function syncAmount(val) {
            document.getElementById("amountInput").value = val;
        }

        function formatCurrency(amount) {
            return "S/ " + parseFloat(amount).toFixed(2);
        }

        function generateRequestCode() {
            return "MC" + Math.floor(Math.random() * 90000 + 10000);
        }

        function handlePreview() {
            const amount = parseFloat(document.getElementById("amountInput").value);
            const months = parseFloat(document.getElementById("termSelect").value);
            const errorText = document.getElementById("errorText");

            const error = validateAmount(amount);
            if (error) {
                errorText.textContent = error;
                errorText.classList.remove("hidden");
                return;
            }

            errorText.classList.add("hidden");

            const interestRate = 0.05;
            let totalInterest = 0;
            let totalPayment = 0;
            let monthlyPayment = 0;

            if (months === 0.5) {
                totalInterest = amount * (interestRate / 2);
                totalPayment = amount + totalInterest;
                monthlyPayment = totalPayment;
            } else {
                totalInterest = amount * interestRate * months;
                totalPayment = amount + totalInterest;
                monthlyPayment = totalPayment / months;
            }

            document.getElementById("resPrincipal").textContent = formatCurrency(amount);
            document.getElementById("resPlazo").textContent = months === 0.5 ? "15 días" : `${months} mes(es)`;
            document.getElementById("tasa").textContent = "5%";
            document.getElementById("resInteres").textContent = formatCurrency(totalInterest);
            document.getElementById("resMensual").textContent = formatCurrency(monthlyPayment);
            document.getElementById("resTotal").textContent = formatCurrency(totalPayment);

            showStep(2);
        }

        function sendRequest() {
            const PagoFinal = parseFloat(document.getElementById("resTotal").textContent.replace(/[^\d.]/g, ''));
            const amount = parseFloat(document.getElementById("amountInput").value);
            const months = parseFloat(document.getElementById("termSelect").value);
            const error = validateAmount(amount);
        
            if (error) {
                alert(error);
                return;
            }
        
            document.getElementById("resCodigo").textContent = generateRequestCode();
            document.getElementById("resMonto").textContent = formatCurrency(amount);
            document.getElementById("resPagoFinal").textContent = formatCurrency(PagoFinal);
            document.getElementById("resPlazoFinal").textContent = months === 0.5 ? "15 días" : `${months} mes(es)`;
            document.getElementById("resFechaPago").textContent = calculatePaymentDate(months);
        
            showStep(3);
            // Mostrar el resultBox quitando la clase hidden
            document.getElementById("resultBox").classList.remove("hidden");
            document.getElementById("resultBox").scrollIntoView({ behavior: 'smooth' });
        }

        function calculatePaymentDate(months) {
            const now = new Date();
            let daysToAdd = months === 0.5 ? 15 : months * 30;
            now.setDate(now.getDate() + daysToAdd);
            return now.toLocaleDateString("es-PE", { day: '2-digit', month: 'long', year: 'numeric' });
        }

        function validateAmount(amount) {
            if (!amount || isNaN(amount)) return "Ingrese un monto válido.";
            if (amount < 50) return "El monto mínimo es S/ 50.";
            if (amount > 500) return "El monto máximo es S/ 500.";
            return null;
        }

        // Navegación
        function goBack() {
            showStep(1);
        }
        function goBackToStep2() {
            showStep(2);
        }
        function goToScan() {
            window.location.href = "qrscanner.html";
        }
        function goToSend() {
            window.location.href = "sendmoney.html";
        }
        function goToSettings() {
            window.location.href = "settings.html";
        }
        function logout() {
            try {
                localStorage.clear();
                sessionStorage.clear();
                const cookies = document.cookie.split(";");
                cookies.forEach(cookie => {
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
                    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;`;
                });
            } finally {
                window.location.href = "login-pin.html";
            }
        }
        function cancelAndReturn() {
            window.location.href = "dashboard.html";
        }
    </script>

</body>

</html>
