<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="icon" href="img/billetito.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-6xl {
            font-size: 2.75rem !important;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 to-green-100 flex flex-col">
    <!-- HEADER -->
    <header class="w-full bg-[#00DF00] shadow-lg p-3 flex justify-between items-center rounded-b-3xl">
        <!-- IZQUIERDA: Hamburguesa + Logo -->
        <div class="flex items-center gap-3">
            <!-- Botón menú hamburguesa -->
            <button onclick="toggleSidebar()" class="text-white hover:text-green-200 transition duration-200"
                aria-label="Abrir menú">
                <!-- Icono hamburguesa -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <!-- Logo -->
            <!--<a href="dashboard.html" class="text-3xl font-extrabold text-white no-underline hover:no-underline">
                <img src="img/IsoLogo Billetito blanco.png" alt="Logo Billetito"
                    class="max-w-[40px] h-30 object-contain" />
            </a>-->
        </div>

        <!-- DERECHA: Soporte + Notificaciones -->
        <div class="flex items-center gap-4 relative">
            <!-- Soporte (auriculares) -->
            <button onclick="toggleSupport()" class="text-white hover:text-green-200 transition duration-200"
                aria-label="Soporte">
                <!-- Headphones (estilo heroicons) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12a9 9 0 1118 0v3a3 3 0 01-3 3h-1.5a1.5 1.5 0 01-1.5-1.5V14a2 2 0 012-2H21M3 12h3a2 2 0 012 2v2.5A1.5 1.5 0 016.5 18H5a3 3 0 01-3-3v-3z" />
                </svg>
            </button>

            <!-- Notificaciones (campana) -->
            <div class="relative">
                <button onclick="toggleNotifications()"
                    class="text-white hover:text-green-200 transition duration-200 relative"
                    aria-label="Notificaciones">
                    <!-- Bell (heroicons) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <span id="notifBadge"
                        class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-xs px-1.5 py-0.5 rounded-full"></span>
                </button>

                <!-- Panel de notificaciones -->
                <div id="notifPanel"
                    class="hidden absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-2xl p-3 text-gray-700 z-50">
                    <div class="flex items-center justify-between">
                        <p class="font-semibold text-gray-900">Notificaciones</p>
                        <button onclick="markNotificationsRead()" class="text-xs text-[#00DF00] hover:underline">Marcar
                            leídas</button>
                    </div>
                    <ul id="notifList" class="mt-2 space-y-2 text-sm"></ul>
                </div>
            </div>
        </div>
    </header>

    <!-- SIDEBAR (ahora desde la IZQUIERDA) -->

        class="fixed top-0 left-0 w-64 h-full bg-white shadow-lg transform -translate-x-full transition-transform duration-300 z-50">
        <!-- Encabezado del sidebar -->
        <div class="bg-[#00DF00] p-4 flex justify-between items-center">
            <h2 class="text-white font-bold text-lg">Menú</h2>
            <button onclick="toggleSidebar()" class="text-white hover:text-gray-200" aria-label="Cerrar menú">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path fill-rule="evenodd"
                        d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <!-- Opciones -->
        <nav class="flex flex-col p-4 space-y-4">
            <a href="settings.html?section=seccionPerfil"

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path fill-rule="evenodd"

                <span>Mi perfil</span>
            </a>
            <a href="settings.html?section=seccionPreguntasFrecuentes"

                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                </svg>

                    <path fill-rule="evenodd"
                        d="M15.75 1.5a6.75 6.75 0 0 0-6.651 7.906c.067.39-.032.717-.221.906l-6.5 6.499a3 3 0 0 0-.878 2.121v2.818c0 .414.336.75.75.75H6a.75.75 0 0 0 .75-.75v-1.5h1.5A.75.75 0 0 0 9 19.5V18h1.5a.75.75 0 0 0 .53-.22l2.658-2.658c.19-.189.517-.288.906-.22A6.75 6.75 0 1 0 15.75 1.5Zm0 3a.75.75 0 0 0 0 1.5A2.25 2.25 0 0 1 18 8.25a.75.75 0 0 0 1.5 0 3.75 3.75 0 0 0-3.75-3.75Z"

                    <path fill-rule="evenodd"
                        d="M3 4.875C3 3.839 3.84 3 4.875 3h4.5c1.036 0 1.875.84 1.875 1.875v4.5c0 1.036-.84 1.875-1.875 1.875h-4.5A1.875 1.875 0 0 1 3 9.375v-4.5ZM4.875 4.5a.375.375 0 0 0-.375.375v4.5c0 .207.168.375.375.375h4.5a.375.375 0 0 0 .375-.375v-4.5a.375.375 0 0 0-.375-.375h-4.5Zm7.875.375c0-1.036.84-1.875 1.875-1.875h4.5C20.16 3 21 3.84 21 4.875v4.5c0 1.036-.84 1.875-1.875 1.875h-4.5a1.875 1.875 0 0 1-1.875-1.875v-4.5Zm1.875-.375a.375.375 0 0 0-.375.375v4.5c0 .207.168.375.375.375h4.5a.375.375 0 0 0 .375-.375v-4.5a.375.375 0 0 0-.375-.375h-4.5ZM6 6.75A.75.75 0 0 1 6.75 6h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75A.75.75 0 0 1 6 7.5v-.75Zm9.75 0A.75.75 0 0 1 16.5 6h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75ZM3 14.625c0-1.036.84-1.875 1.875-1.875h4.5c1.036 0 1.875.84 1.875 1.875v4.5c0 1.035-.84 1.875-1.875 1.875h-4.5A1.875 1.875 0 0 1 3 19.125v-4.5Zm1.875-.375a.375.375 0 0 0-.375.375v4.5c0 .207.168.375.375.375h4.5a.375.375 0 0 0 .375-.375v-4.5a.375.375 0 0 0-.375-.375h-4.5Zm7.875-.75a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75Zm6 0a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75ZM6 16.5a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75Zm9.75 0a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75Zm-3 3a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75Zm6 0a.75.75 0 0 1 .75-.75h.75a.75.75 0 0 1 .75.75v.75a.75.75 0 0 1-.75.75h-.75a.75.75 0 0 1-.75-.75v-.75Z"

    <!-- Fondo oscuro para SIDEBAR -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-40 hidden z-40" onclick="toggleSidebar()"></div>

    <!-- MODAL SOPORTE -->
    <div id="supportModal" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black bg-opacity-40" onclick="toggleSupport()"></div>
        <div class="relative z-10 max-w-sm mx-auto mt-24 bg-white rounded-2xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-[#00DF00]">Soporte</h3>
            <p class="mt-1 text-sm text-gray-600">¿En qué podemos ayudarte?</p>
            <p class="mt-1 text-sm text-gray-600">Puedes contactarnos mediante:</p>
            <div class="mt-4 flex gap-2">
                <button onclick="openSupportChat()"
                    class="flex-1 bg-[#00DF00] text-white py-2 rounded-xl font-semibold hover:bg-green-700 transition">
                    Correo
                </button>
                <a href="tel:+51080000200"
                    class="flex-1 bg-green-50 text-[#00DF00] py-2 rounded-xl font-semibold text-center hover:bg-green-200 transition">Llamar</a>
            </div>
            <button onclick="toggleSupport()"
                class="mt-3 w-full text-sm text-gray-500 hover:text-gray-700">Cerrar</button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow flex items-start justify-center p-4 pb-20">
        <div
            class="flex flex-col items-center justify-start w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl border border-green-100">
            <h2 id="userGreeting" class="text-4xl font-extrabold text-center text-[#00DF00] mb-4">¡Hola!</h2>

            <div
                class="bg-[#00DF00] p-6 rounded-2xl mb-6 text-center shadow-lg w-full transform transition-all duration-300 hover:scale-105">
                <p class="text-green-100 text-lg font-medium">Mi billetito:</p>
                <p id="mainBalance" class="text-white text-6xl font-extrabold mt-2">S/ 0.00</p>
            </div>

            <div class="w-full mb-6">
                <h3 class="text-2xl font-bold text-[#00DF00] mb-4">Mis Servicios</h3>

                <div class="bg-green-50 p-5 rounded-2xl shadow-inner border border-green-200 mb-4">
                    <p class="text-[#00DF00] text-lg font-semibold mb-2">Crédito</p>
                    <div id="creditSection">
                        <!-- HTML dentro de creditSection -->
                        <p id="creditBalanceText" class="text-[#00DF00] text-2xl font-bold hidden"></p>
                        <button id="microcreditBtn" onclick="goToMicrocredit()"
                            class="w-full bg-[#00DF00] text-white py-3 px-4 rounded-xl font-bold text-lg hover:bg-green-700 transition duration-200 shadow-md flex items-center justify-center gap-2">

                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" />
                            </svg>

                            <span>Solicitar Billetito</span>
                        </button>

                    </div>
                </div>

                <button onclick="goToPayment()"
                    class="w-full bg-green-50 text-[#00DF00] py-4 rounded-xl font-bold text-lg hover:bg-green-200 transition duration-200 shadow-lg flex items-center justify-center transform hover:scale-105">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-8 h-8 mr-2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    Devolver Billetito
                </button>
            </div>
        </div>
    </main>

    <!-- Navegación inferior -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white p-4 pb-6 sm:px-6 sm:py-4 flex justify-center gap-3 sm:gap-4">
        <button onclick="goToScan()"
            class="bg-white text-[#00DF00] font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg border border-[#00DF00] flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[160px] justify-center hover:shadow-xl transition-shadow text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z" />
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z" />
            </svg>
            <span class="whitespace-nowrap">Escanear</span>
        </button>

        <button onclick="goToSend()"
            class="bg-[#00DF00] text-white font-semibold px-3 sm:px-6 py-2 sm:py-3 rounded-xl sm:rounded-2xl shadow-lg flex items-center gap-2 sm:gap-3 flex-1 sm:flex-none sm:min-w-[140px] max-w-[180px] justify-center hover:bg-green-600 transition-colors text-sm sm:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 sm:w-6 sm:h-6 flex-shrink-0">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
            <span class="whitespace-nowrap">Enviar billetito</span>
        </button>
    </nav>

    <script>
        // Simulación de usuario actual
        const currentUser = {
            name: "Deyvi Zelada",
            balance: 820.75,
            creditBalance: 0 // Cambia esto a un número mayor para probar
        };

        function formatCurrency(amount) {
            return "S/ " + amount.toFixed(2);
        }

        // Mostrar info
        document.getElementById("userGreeting").textContent = "¡Hola, " + currentUser.name.split(" ")[0] + "!";
        document.getElementById("mainBalance").textContent = formatCurrency(currentUser.balance);

        // Sección de crédito
        const creditText = document.getElementById("creditBalanceText");
        const microcreditBtn = document.getElementById("microcreditBtn");

        if (currentUser.creditBalance > 0) {
            creditText.textContent = `Saldo de Crédito: ${formatCurrency(currentUser.creditBalance)}`;
            creditText.classList.remove("hidden");
            microcreditBtn.classList.add("hidden");
        } else {
            creditText.classList.add("hidden");
            microcreditBtn.classList.remove("hidden");
        }

        // -------- Sidebar (ahora abre desde la IZQUIERDA) --------
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("overlay");
            if (sidebar.classList.contains("-translate-x-full")) {
                sidebar.classList.remove("-translate-x-full");
                overlay.classList.remove("hidden");
            } else {
                sidebar.classList.add("-translate-x-full");
                overlay.classList.add("hidden");
            }
        }

        // -------- Soporte --------
        function toggleSupport() {
            document.getElementById("supportModal").classList.toggle("hidden");
        }
        function openSupportChat() {
            // Redirige al cliente de correo predeterminado
            window.location.href = "mailto:soporte@billetito.com";
        }

        // -------- Notificaciones --------
        const notifications = [
            { id: 1, text: "Tu solicitud de Billetito fue aprobada 🎉", time: "Hoy 10:20", read: false },
            { id: 2, text: "Recibiste S/ 20.00 de Ana", time: "Ayer 18:05", read: false },
        ];

        function updateNotifBadge() {
            const unread = notifications.filter(n => !n.read).length;
            const badge = document.getElementById("notifBadge");
            if (unread > 0) {
                badge.textContent = unread;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }
        }

        function renderNotifications() {
            const list = document.getElementById("notifList");
            list.innerHTML = "";
            if (notifications.length === 0) {
                list.innerHTML = `<li class="text-gray-500">No tienes notificaciones</li>`;
                return;
            }
            notifications.forEach(n => {
                const li = document.createElement("li");
                li.className = "flex items-start gap-2";
                li.innerHTML = `
                    <span class="mt-0.5">🔔</span>
                    <div>
                        <p class="${n.read ? 'text-gray-500' : 'text-gray-800 font-medium'}">${n.text}</p>
                        <p class="text-xs text-gray-400">${n.time}</p>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function toggleNotifications() {
            const panel = document.getElementById("notifPanel");
            panel.classList.toggle("hidden");
            if (!panel.classList.contains("hidden")) {
                renderNotifications();
            }
        }

        function markNotificationsRead() {
            notifications.forEach(n => n.read = true);
            renderNotifications();
            updateNotifBadge();
        }

        // Cerrar panel de notificaciones al hacer click fuera
        document.addEventListener("click", (e) => {
            const panel = document.getElementById("notifPanel");
            const badgeBtn = e.target.closest('[aria-label="Notificaciones"]');
            const clickedInsidePanel = e.target.closest("#notifPanel");
            if (!badgeBtn && !clickedInsidePanel && !panel.classList.contains("hidden")) {
                panel.classList.add("hidden");
            }
        });

        // Inicializar badge
        updateNotifBadge();

        // Navegación
        function goToMicrocredit() {
            window.location.href = "microcredit.html";
        }

        function goToSimulator() {
            window.location.href = "simulator.html";
        }

        function goToPayment() {
            window.location.href = "pagar-credito.html";
        }

        function goToSettings() {
            window.location.href = "settings.html";
        }

        function goToScan() {
            window.location.href = "qrscanner.html";
        }

        function goToSend() {
            window.location.href = "sendmoney.html";
        }

        function logout() {
            try {
                // Limpiar localStorage
                localStorage.clear();
                sessionStorage.clear();

                // Limpiar todas las cookies
                const cookies = document.cookie.split(";");
                cookies.forEach(cookie => {
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
                    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;`;
                    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=${window.location.hostname};`;
                });

                console.log('Logout exitoso - datos limpiados');

            } catch (error) {
                console.error('Error durante el logout:', error);
            } finally {
                // Redirigir siempre, incluso si hay errores
                window.location.href = "login-pin.html";
            }
        }
    </script>
</body>
